<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Admin - Gerador de ingressos</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        /* [Mesmos estilos anteriores aqui] */
        :root { --primary: #4a90e2; --success: #27ae60; --danger: #e74c3c; --dark: #2c3e50; --light: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 25px; border-radius: 12px; }
        .form-section { display: flex; gap: 10px; margin-bottom: 20px; padding: 15px; background: #f9f9f9; border-radius: 8px; flex-wrap: wrap; }
        input { padding: 8px; border: 1px solid #ddd; border-radius: 4px; flex: 1; }
        button { padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; color: white; background: var(--primary); }
        .btn-print { background: var(--dark); } .btn-danger { background: var(--danger); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        
        #areaImpressao { display: none; }
        @media print {
            body > *:not(#areaImpressao) { display: none !important; }
            #areaImpressao { display: block !important; position: absolute; left: 0; top: 0; width: 100%; }
            .grid-impressao { display: grid !important; grid-template-columns: 85mm 85mm !important; gap: 5mm !important; justify-content: center; }
            .ticket-print { width: 85mm !important; height: 50mm !important; border: 1px solid #000 !important; display: flex !important; flex-direction: column !important; page-break-inside: avoid !important; }
            .ticket-header { background: #2c3e50 !important; color: white !important; padding: 3px; text-align: center; font-size: 7pt; }
            .ticket-body { flex: 1; display: flex !important; align-items: center; justify-content: space-around; padding: 5px; }
            .ticket-name { font-size: 10pt; font-weight: bold; }
            .ticket-footer { font-size: 6pt; text-align: center; border-top: 0.5px dashed #ccc; padding: 2px; }
            canvas, img { width: 30mm !important; height: 30mm !important; }
        }
        .stats-grid {
            display: flex;          /* Ativa o alinhamento horizontal */
            gap: 15px;              /* Espaço entre os cartões */
            margin-bottom: 20px;
            flex-wrap: nowrap;      /* Garante que fiquem sempre na mesma linha */
        }

        .stat-card {
            flex: 1;                /* Faz com que todos os cartões tenham o mesmo tamanho */
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            color: rgb(0, 0, 0);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column; /* Organiza o título e o número verticalmente dentro do card */
            justify-content: center;
        }

        .stat-card span {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.9;
        }

        .stat-card h2 {
            margin: 10px 0 0 0;
            font-size: 2rem;
        }
        @media (max-width: 600px) {
            .stats-grid {
                flex-direction: column; /* No telemóvel, eles voltam a ficar um por cima do outro */
            }
        }

        .ticket-body {
            display: flex !important;
            flex-direction: row !important; /* Força ficar lado a lado */
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            height: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        
        <h1>Configurações do Evento</h1>

        <div class="stats-grid">
            <div class="stat-card blue">
                <span>Total</span>
                <h2 id="total">0</h2> </div>
            <div class="stat-card green">
                <span>Check-in</span>
                <h2 id="checkin">0</h2> </div>
            <div class="stat-card orange">
                <span>A confirmar</span>
                <h2 id="ausentes">0</h2> </div>
        </div>

        <div style="background: #eee; border-radius: 10px; height: 20px; position: relative; overflow: hidden; margin-bottom: 15px;">
            <div id="barraProgresso" style="background: #27ae60; width: 0%; height: 100%; transition: 0.5s;"></div>
            <span id="percent" style="position: absolute; width: 100%; text-align: center; top: 0; font-size: 10pt;">0%</span>
        </div>

        <div class="form-section" style="background:#eef2f7">
            <input type="text" id="cfgTitulo" placeholder="Título" oninput="save()">
            <input type="text" id="cfgData" placeholder="Data" oninput="save()">
            <input type="text" id="cfgLocal" placeholder="Local" oninput="save()">
        </div>

        <div class="form-section" style="display: block;">
            <strong>📋 Importar Lista de Nomes</strong>
            <div class="row" style="margin-top: 10px;">
                <input type="text" id="prefLista" placeholder="Prefixo opcional (Ex: VIP, Palestrante, Staff)">
            </div>
            <textarea id="listaNomes" placeholder="João Silva&#10;Maria Santos&#10;Pedro Costa..." 
                    style="width: 100%; height: 80px; margin: 10px 0; padding: 8px; border-radius: 4px; border: 1px solid #ddd;"></textarea>
            <button class="btn-alt" style="width: 100%;" onclick="importarLista()">Gerar Convites da Lista</button>
        </div>

        <div class="form-section">
            <input type="text" id="buscaNome" placeholder="🔍 Procurar participante por nome..." onkeyup="filtrarTabela()">
        </div>

        <div class="form-section">
            <input type="text" id="nomeUni" placeholder="Nome">
            <button onclick="criar()">Criar</button>
            <input type="text" id="prefLote" placeholder="Prefixo" style="max-width:80px">
            <input type="number" id="qtdLote" placeholder="Qtd" style="max-width:60px">
            <button onclick="lote()">Gerar Lote</button>
        </div>

        <button class="btn-print" onclick="imprimirTodos()">🖨️ Imprimir Todos</button>
        <button style="background: #c0392b; color: white;" onclick="gerarPDFs()">📄 Gerar PDFs Individuais</button>
        <button onclick="window.location.href='/descarregar-todos'" style="background: #27ae60;">📥 Descarregar Todos (.ZIP)</button>
        <button class="btn-danger" style="float:right" onclick="reset()">Resetar Dados</button>

        <table id="tabela">
            <thead><tr><th>ID</th><th>Nome</th><th>Status</th><th>Ação</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <div id="areaImpressao"><div id="wrapperTickets" class="grid-impressao"></div></div>

    <script>
        function save() {
            localStorage.setItem('cfg', JSON.stringify({
                t: document.getElementById('cfgTitulo').value,
                d: document.getElementById('cfgData').value,
                l: document.getElementById('cfgLocal').value
            }));
        }

        function load() {
            const salvo = localStorage.getItem('cfg');
            if (salvo) {
                const c = JSON.parse(salvo);
                document.getElementById('cfgTitulo').value = c.t || "";
                document.getElementById('cfgData').value = c.d || "";
                document.getElementById('cfgLocal').value = c.l || "";
            } else {
                // Valores iniciais se for a primeira vez
                document.getElementById('cfgTitulo').value = "EVENTO 2026";
                document.getElementById('cfgData').value = "25/03/2026";
                document.getElementById('cfgLocal').value = "AUDITÓRIO";
                save(); // Salva os padrões imediatamente
            }
        }

        function buildTicket(nome, id) {
            // Captura os dados atuais dos inputs de configuração
            const titulo = document.getElementById('cfgTitulo').value || 'DEDICAÇÃO DO SALÃO DO REINO';
            const dataEv = document.getElementById('cfgData').value || '19/04/2026 - 08h30';
            const localEv = document.getElementById('cfgLocal').value || 'Rua Leopoldo Rodrigues, 67. Centro, Estância, SE';
            
            const qid = `q-${id}-${Math.random().toString(36).substr(2,3)}`;
            
            // O seu SVG aqui
            const meuLogoSVG = `<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24"><g><path d="M23.5 21H23V3.5A1.46 1.46 0 0 0 21.5 2h-19A1.46 1.46 0 0 0 1 3.5V21H.5a.5.5 0 0 0 0 1h23a.5.5 0 0 0 0-1zM2.5 3h19a.46.46 0 0 1 .5.5V5H2V3.51A.47.47 0 0 1 2.5 3zM8 21H4v-7h4zm1 0v-7.5a.5.5 0 0 0-.5-.5h-5a.5.5 0 0 0-.5.5V21H2V6h20v15z"></path><path d="M19.5 18h-9a.5.5 0 0 1-.5-.5v-9a.5.5 0 0 1 .5-.5h9a.5.5 0 0 1 .5.5v9a.5.5 0 0 1-.5.5zM11 17h8V9h-8z"></path><path d="M12.81 11.17h.74v2.3a2.14 2.14 0 0 1-.05.52 1.13 1.13 0 0 1-.18.4.93.93 0 0 1-.33.26 1.26 1.26 0 0 1-.51.09 1.91 1.91 0 0 1-.56-.07 1.18 1.18 0 0 1-.39-.19l.2-.66.32.16a.86.86 0 0 0 .34.07.35.35 0 0 0 .33-.15 1 1 0 0 0 .09-.46z"></path><path d="M16.58 14.7l-.52-2.14-.52 2.14h-.66l-1-3.53h.76l.51 2.15.08.41.07-.42.45-2.06h.63l.47 2.07.08.41.07-.41.48-2.15h.75l-1 3.53z"></path></g></svg>`; 

            return { 
                qid, 
                html: `
                <div class="ticket-print">
                    <div class="ticket-header">${titulo.toUpperCase()}</div>
                    <div class="ticket-body">
                        <div style="flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: flex-start;">
                            <div style="margin-bottom: 8px;">${meuLogoSVG}</div>
                            <div style="font-size: 12pt; font-weight: bold;">
                                ${nome} <span style="font-size: 10pt; font-weight: normal; margin-left: 5px;"><br>ID: ${id}</span>
                            </div>
                            <div style="font-size: 7.5pt; color: #555; margin-top: 4px;">
                                Data: ${dataEv}<br>
                                Local: ${localEv}
                            </div>
                        </div>
                        <div id="${qid}" style="margin-left: 10px;"></div>
                    </div>
                    <div class="ticket-footer" style="font-size: 6.5pt; text-align: center; border-top: 1px solid #eee; padding-top: 3px;">
                        Válido para uma(1) pessoa - Intransferível - Será exigido na entrada
                    </div>
                </div>` 
            };
        }

        async function imprimirTodos() {
            const res = await fetch('/listar-ingressos');
            const dados = await res.json();
            const wrap = document.getElementById('wrapperTickets');
            wrap.innerHTML = ""; // Limpa a área de impressão

            // Criamos todos os elementos primeiro
            for (const i of dados) {
                const { qid, html } = buildTicket(i.nome, i.id);
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = html;
                wrap.appendChild(tempDiv.firstElementChild); // Adiciona ao DOM

                // Agora que o elemento ESTÁ no DOM, geramos o QR Code
                const elementoQr = document.getElementById(qid);
                if (elementoQr) {
                    new QRCode(elementoQr, {
                        text: `${window.location.origin}/validar-auto.html?id=${i.id}`,
                        width: 110,
                        height: 110
                    });
                }
            }
            
            // Aguarda um curto tempo para renderizar as imagens antes de abrir a janela de impressão
            setTimeout(() => window.print(), 1000);
        }
        
        async function gerarPDFs() {
            if (!confirm("Deseja gerar os convites em formato PDF?")) return;
            const res = await fetch('/gerar-pdfs', { method: 'POST' });
            const data = await res.json();
            alert(data.mensagem);
        }

        function imprimirUnico(nome, id) {
            const janela = window.open('', '_blank');
            
            // DEFINA AQUI O TAMANHO REAL DA SUA ETIQUETA/PAPEL
            // Ex: 85mm x 55mm (Tamanho padrão de cartão de visita/crachá horizontal)
            const larguraPapel = "85mm"; 
            const alturaPapel = "55mm";

            // Captura os dados atuais dos inputs de configuração do admin
            const titulo = document.getElementById('cfgTitulo').value || 'DEDICAÇÃO DO SALÃO DO REINO';
            const dataEv = document.getElementById('cfgData').value || '19/04/2026 - 08h30';
            const localEv = document.getElementById('cfgLocal').value || 'Rua Leopoldo Rodrigues, 67. Centro, Estância, SE';

            // O seu SVG do logo (mantido do buildTicket)
            const meuLogoSVG = `<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24"><g><path d="M23.5 21H23V3.5A1.46 1.46 0 0 0 21.5 2h-19A1.46 1.46 0 0 0 1 3.5V21H.5a.5.5 0 0 0 0 1h23a.5.5 0 0 0 0-1zM2.5 3h19a.46.46 0 0 1 .5.5V5H2V3.51A.47.47 0 0 1 2.5 3zM8 21H4v-7h4zm1 0v-7.5a.5.5 0 0 0-.5-.5h-5a.5.5 0 0 0-.5.5V21H2V6h20v15z"></path><path d="M19.5 18h-9a.5.5 0 0 1-.5-.5v-9a.5.5 0 0 1 .5-.5h9a.5.5 0 0 1 .5.5v9a.5.5 0 0 1-.5.5zM11 17h8V9h-8z"></path><path d="M12.81 11.17h.74v2.3a2.14 2.14 0 0 1-.05.52 1.13 1.13 0 0 1-.18.4.93.93 0 0 1-.33.26 1.26 1.26 0 0 1-.51.09 1.91 1.91 0 0 1-.56-.07 1.18 1.18 0 0 1-.39-.19l.2-.66.32.16a.86.86 0 0 0 .34.07.35.35 0 0 0 .33-.15 1 1 0 0 0 .09-.46z"></path><path d="M16.58 14.7l-.52-2.14-.52 2.14h-.66l-1-3.53h.76l.51 2.15.08.41.07-.42.45-2.06h.63l.47 2.07.08.41.07-.41.48-2.15h.75l-1 3.53z"></path></g></svg>`; 

            let conteudo = `
                <html>
                <head>
                    <title>Imprimir Convite - ${nome}</title>
                    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"><\/script>
                    <style>
                        /* Configuração da Página de Impressão */
                        @page {
                            size: ${larguraPapel} ${alturaPapel};
                            margin: 0;
                        }

                        body { 
                            margin: 0; 
                            padding: 0; 
                            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
                            -webkit-print-color-adjust: exact;
                            display: flex;
                            justify-content: center;
                            align-items: center;
                            width: ${larguraPapel};
                            height: ${alturaPapel};
                        }

                        /* Contêiner Principal (A Borda Externa do Convite) */
                        .convite-container {
                            width: 100%;
                            height: 100%;
                            border: 1px solid #000; /* Borda preta fina como na imagem */
                            box-sizing: border-box;
                            display: flex;
                            flex-direction: column;
                            overflow: hidden;
                        }

                        /* Faixa Superior (Título) */
                        .topo-titulo {
                            text-align: center;
                            font-size: 8pt;
                            color: #888; /* Cinza claro */
                            padding: 5px 0;
                            text-transform: uppercase;
                            letter-spacing: 1px;
                            border-bottom: 1px solid #eee;
                        }

                        /* Corpo Central (Logo, Nome, Detalhes e QR Code) */
                        .corpo-central {
                            flex: 1;
                            display: flex;
                            flex-direction: row; /* Lado a lado */
                            align-items: center;
                            justify-content: space-between;
                            padding: 10px 15px;
                            overflow: hidden; /* Garante que nada saia do corpo */
                        }

                        /* Coluna da Esquerda (Textos) */
                        .coluna-textos {
                            flex: 1;
                            display: flex;
                            flex-direction: column;
                            justify-content: center;
                            align-items: flex-start;
                            padding-right: 10px;
                            overflow: hidden; /* Importante para o ajuste do nome */
                        }

                        .area-logo { margin-bottom: 10px; }

                        /* --- AJUSTE CRÍTICO PARA O NOME --- */
                        .nome-convidado {
                            font-weight: bold;
                            color: #000;
                            margin: 0 0 5px 0;
                            
                            /* Força o nome a ficar em UMA LINHA */
                            white-space: nowrap;
                            overflow: hidden; /* Esconde o que transbordar se não reduzir */
                            
                            /* Técnica para reduzir automaticamente a fonte: clamp(mínimo, preferencial, máximo) */
                            /* Usando unidades de viewport do contêiner (cqw) se container query estivesse ativo, 
                            mas como é impressão, usamos uma combinação segura. */
                            font-size: clamp(10pt, 4cqw, 18pt); /* Mínimo 10pt, Preferencial 4% da largura do contêiner, Máximo 18pt */
                            
                            /* Fallback para navegadores antigos que não suportam clamp perfeitamente em impressão */
                            max-width: 100%; 
                            text-overflow: ellipsis; /* Adiciona "..." se o nome for absurdamente longo mesmo no tamanho mínimo */
                        }

                        .id-ingresso {
                            font-size: 11pt;
                            font-weight: normal;
                            color: #000;
                            margin-bottom: 8px;
                        }

                        .detalhes-evento {
                            font-size: 8pt;
                            color: #555;
                            line-height: 1.3;
                        }

                        /* Coluna da Direita (QR Code) */
                        .coluna-qrcode {
                            width: 110px; /* Tamanho fixo para o QR Code */
                            height: 110px;
                            display: flex;
                            justify-content: center;
                            align-items: center;
                            flex-shrink: 0; /* Impede que a coluna do QR Code encolha */
                        }

                        /* Rodapé (Texto Legal) */
                        .rodape-legal {
                            font-size: 7pt;
                            text-align: center;
                            color: #333;
                            border-top: 1px solid #000; /* Linha preta fina */
                            padding: 4px 0;
                            background-color: #f9f9f9;
                        }

                        @media print {
                            .convite-container { border: 1px solid #000 !important; }
                            .rodape-legal { border-top: 1px solid #000 !important; }
                            /* Garante que o clamp funcione bem na impressão */
                            .nome-convidado { font-size: clamp(10pt, 3.5vw, 18pt) !important; } 
                        }
                    </style>
                </head>
                <body>
                    <div class="convite-container">
                        <div class="topo-titulo">${titulo}</div>
                        
                        <div class="corpo-central">
                            <div class="coluna-textos">
                                <div class="area-logo">${meuLogoSVG}</div>
                                <h1 class="nome-convidado">${nome}</h1>
                                <div class="id-ingresso">ID: ${id}</div>
                                <div class="detalhes-evento">
                                    Data: ${dataEv}<br>
                                    Local: ${localEv}
                                </div>
                            </div>
                            
                            <div class="coluna-qrcode" id="qrcode"></div>
                        </div>
                        
                        <div class="rodape-legal">
                            Válido para uma(1) pessoa - Intransferível - Será exigido na entrada
                        </div>
                    </div>

                    <script>
                        // Gera o QR Code com o link de validação automática
                        const urlValidacao = window.location.origin + '/validar-auto.html?id=' + "${id}";
                        new QRCode(document.getElementById("qrcode"), {
                            text: urlValidacao,
                            width: 110,
                            height: 110,
                            colorDark : "#000000",
                            colorLight : "#ffffff",
                            correctLevel : QRCode.CorrectLevel.H
                        });

                        // Dispara a impressão assim que tudo (incluindo o QR Code) carregar
                        window.onload = function() {
                            setTimeout(() => {
                                window.print();
                                // window.close(); // Opcional: fechar a aba após imprimir
                            }, 300); 
                        };
                    <\/script>
                </body>
                </html>
            `;

            janela.document.write(conteudo);
            janela.document.close();
        }

        // Função para listar os ingressos (A que estava faltando ou com nome errado)
        async function atualizar() {
            try {
                const res = await fetch('/listar-ingressos');
                const dados = await res.json();
                const corpo = document.querySelector('#tabela tbody');
                corpo.innerHTML = "";
                
                let contCheckin = 0;
                const contTotal = dados.length;

                dados.forEach(i => {
                    if(i.utilizado) contCheckin++;
                    
                    // Criar a linha da tabela
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><code>${i.id}</code></td>
                        <td>${i.nome}</td>
                        <td style="color:${i.utilizado ? 'green':'orange'}">
                            <strong>${i.utilizado ? 'Presente':'Pendente'}</strong>
                        </td>
                        <td>
                            <button class="btn-print" onclick="imprimirUnico('${i.nome}','${i.id}')">🖨️</button>
                            ${!i.utilizado ? 
                                `<button class="btn-main" style="background:#27ae60; margin-left:5px;" onclick="validarManualAdmin('${i.id}')">✅</button>` 
                                : `<button disabled style="background:#ccc; margin-left:5px; border:none; color:white;">✔</button>`
                            }
                        </td>
                    `;
                    tr.innerHTML = `
                        <td><code>${i.id}</code></td>
                        <td>${i.nome}</td>
                        <td style="color:${i.utilizado ? 'green':'orange'}">
                            <strong>${i.utilizado ? 'Presente':'Pendente'}</strong>
                        </td>
                        <td>
                            <button class="btn-print" onclick="imprimirUnico('${i.nome}','${i.id}')">🖨️</button>
                            ${!i.utilizado ? 
                                `<button class="btn-main" style="background:#27ae60; margin-left:5px;" onclick="validarManualAdmin('${i.id}')">✅</button>` 
                                : `<button disabled style="background:#ccc; margin-left:5px; border:none; color:white;">✔</button>`
                            }
                            <button class="btn-danger" style="margin-left:5px;" onclick="eliminarIngresso('${i.id}', '${i.nome}')">🗑️</button>
                        </td>
                    `;
                    corpo.appendChild(tr);
                });

                // --- ATUALIZAÇÃO DOS CARDS ---
                const contAusentes = contTotal - contCheckin;
                const calculoPercent = contTotal > 0 ? Math.round((contCheckin / contTotal) * 100) : 0;

                document.getElementById('total').innerText = contTotal;
                document.getElementById('checkin').innerText = contCheckin;
                document.getElementById('ausentes').innerText = contAusentes;
                
                // --- ATUALIZAÇÃO DA BARRA ---
                document.getElementById('barraProgresso').style.width = calculoPercent + "%";
                document.getElementById('percent').innerText = calculoPercent + "% Ocupação";

            } catch(e) { 
                console.error("Erro ao atualizar indicadores:", e); 
            }
        }

        async function eliminarIngresso(id, nome) {
            // Pedimos confirmação para evitar cliques acidentais
            if (confirm(`Tens a certeza que desejas eliminar o ingresso de: ${nome}?`)) {
                try {
                    const res = await fetch(`/eliminar-ingresso/${id}`, {
                        method: 'DELETE'
                    });

                    if (res.ok) {
                        alert("Ingresso removido!");
                        atualizar(); // Atualiza a tabela e os contadores automaticamente
                    } else {
                        alert("Erro ao eliminar o ingresso.");
                    }
                } catch (e) {
                    alert("Erro de ligação ao servidor.");
                }
            }
        }

        // Função para criar o ingresso corrigida
        async function criar() {
            const nomeInput = document.getElementById('nomeUni');
            const nome = nomeInput.value.trim();
            
            if (!nome) {
                alert("Por favor, digite um nome.");
                return;
            }

            try {
                const res = await fetch('/criar-ingresso', { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({ nome: nome }) 
                });

                if (res.ok) {
                    nomeInput.value = ""; // Limpa o campo
                    await atualizar(); // Chama a função de listagem que agora existe
                } else {
                    alert("Erro ao criar ingresso no servidor.");
                }
            } catch (e) {
                alert("Erro de conexão ao criar ingresso.");
            }
        }

        async function lote() {
            await fetch('/gerar-lote', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({prefixo:document.getElementById('prefLote').value, quantidade:document.getElementById('qtdLote').value}) });
            atualizar();
        }

        async function validarManualAdmin(id) {
            // Recupera la clave del staff para poder validar
            let token = localStorage.getItem('staff_token');
            
            if (!token) {
                token = prompt("Introduza a Chave de Staff para confirmar esta entrada:");
                if (token) localStorage.setItem('staff_token', token);
                else return;
            }

            if (confirm(`Deseja confirmar a entrada do ingresso ${id}?`)) {
                try {
                    const res = await fetch('/validar', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ id, token })
                    });

                    const data = await res.json();

                    if (res.ok) {
                        alert("Entrada confirmada com sucesso!");
                        atualizar(); // Recarga la tabla e indicadores
                    } else {
                        alert("Erro: " + data.mensagem);
                    }
                } catch (e) {
                    alert("Erro de conexão ao validar.");
                }
            }
        }

       async function importarLista() {
            const campoLista = document.getElementById('listaNomes');
            const campoPrefixo = document.getElementById('prefLista');
            
            const nomes = campoLista.value.split('\n').filter(n => n.trim() !== "");
            const prefixo = campoPrefixo.value.trim();

            if (nomes.length === 0) return alert("A lista está vazia!");

            try {
                const res = await fetch('/importar-lista', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        nomes: nomes,
                        prefixo: prefixo // Envia o prefixo para o servidor
                    })
                });
                
                if (res.ok) {
                    campoLista.value = "";
                    campoPrefixo.value = ""; // Limpa o prefixo após gerar
                    atualizar();
                    alert(`Sucesso! ${nomes.length} convites gerados.`);
                }
            } catch (e) { 
                alert("Erro na importação."); 
            }
        }

        // Filtra a tabela instantaneamente
        function filtrarTabela() {
            const termo = document.getElementById('buscaNome').value.toLowerCase();
            const linhas = document.querySelectorAll('#tabela tbody tr');

            linhas.forEach(linha => {
                const nome = linha.cells[1].innerText.toLowerCase();
                linha.style.display = nome.includes(termo) ? "" : "none";
            });
        }

        async function reset() { if(confirm("Limpar?")) { await fetch('/limpar-evento', {method:'POST'}); atualizar(); } }

        window.onload = () => { load(); atualizar(); };
        setInterval(atualizar, 5000);
    </script>
</body>
</html>
